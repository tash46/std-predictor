<!DOCTYPE html>
<html>
<head>
    <title>Guess the Standard Deviation!</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e6f5ff, #ccecff, #a7d8ff);
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 45px;
            border-radius: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            text-align: center;
            width: 420px;
        }

        .secret-subtitle {
            font-size: 13px;
            color: transparent;
            user-select: text;
            margin-bottom: 8px;
        }

        .secret-subtitle::selection {
            color: white;
            background: rgba(0, 0, 0, 0.4);
        }

        h1 {
            margin-bottom: 30px;
            color: #2c3e50;
            font-weight: 600;
        }

        input[type="file"] {
            margin-bottom: 20px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #a7d8ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #87c8ff;
            transform: scale(1.05);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>

<body>
    <div class="card">
        <p class="secret-subtitle">병현이만을 위해 연경이가 만든</p>
        <h1>Guess the Standard Deviation!</h1>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br>
            <button type="submit">Upload and Predict</button>
        </form>
    </div>
</body>
</html>
